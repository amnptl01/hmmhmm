<!DOCTYPE html>
<html>
<head>
  <title>Do You Know Aman? 🎮</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    .box {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 8px;
    }

    .thanks {
      font-size: 40px;
      margin-top: 40px;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { color: #fff; }
      to { color: #22c55e; }
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="question"></h2>
  <input type="text" id="answer" placeholder="Type answer">
  <br>
  <button onclick="next()">Submit</button>
  <p id="result"></p>
</div>

<script>
let started = false;

const questions = [
  { q: "What is my age?", a: "20" },
  { q: "Which is my favorite sports team?", a: "rcb" },
  { q: "Do I prefer dogs or cats?", a: "cats" },
  { q: "What is my birth date?", a: "28" },
  { q: "What is my favorite color?", a: "green" },
  { q: "What is my favorite food?", a: "chicken" }
];

let index = 0;
let score = 0;

// First question (no score)
document.getElementById("question").innerText = "Do you know Aman?";

function next() {
  let ans = document.getElementById("answer").value.toLowerCase();

  // FIRST QUESTION LOGIC
  if (!started) {
    if (ans === "yes") {
      started = true;
      document.getElementById("question").innerText = questions[index].q;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "Let's start 😎";
    } else {
      document.body.innerHTML = "<h1>Bye Tata 👋</h1>";
    }
    return;
  }

  // MAIN QUESTIONS
  let correct = questions[index].a;

  if (ans === correct) {
    score++;
    document.getElementById("result").innerText = "Correct 😄";
  } else {
    document.getElementById("result").innerText = "Wrong 😅";
  }

  index++;

  if (index < questions.length) {
    setTimeout(() => {
      document.getElementById("question").innerText = questions[index].q;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";
    }, 800);
  } else {
    showFinal();
  }
}

function showFinal() {
  document.body.innerHTML = `
    <h1>🎉 Game Completed 🎉</h1>
    <h2>You got ${score} / ${questions.length} correct 😎</h2>
    <div class="thanks">✨ THANK YOU ✨</div>
  `;
}
</script>

</body>
</html>
