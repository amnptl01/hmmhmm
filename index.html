<!DOCTYPE html>
<html>
<head>
  <title>Do You Know Aman? 🎮</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    .box {
      margin-top: 80px;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 8px;
    }
    .thanks {
      font-size: 40px;
      margin-top: 30px;
      animation: glow 1s infinite alternate;
    }
    @keyframes glow {
      from { color: #fff; }
      to { color: #22c55e; }
    }
    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid white;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="question">Enter your name</h2>
  <input type="text" id="answer">
  <br>
  <button onclick="nextStep()">Submit</button>
  <p id="result"></p>
</div>

<script>
let step = 0;
let playerName = "";
let index = 0;
let score = 0;

const questions = [
  { q: "What is my age?", a: "20" },
  { q: "Which is my favorite sports team?", a: "rcb" },
  { q: "Do I prefer dogs or cats?", a: "cats" },
  { q: "What is my birth date?", a: "28" },
  { q: "What is my favorite color?", a: "green" },
  { q: "What is my favorite food?", a: "chicken" }
];

function nextStep() {
  let input = document.getElementById("answer");
  let ans = input.value.trim().toLowerCase();

  // STEP 0: NAME
  if (step === 0) {
    if (ans === "") {
      document.getElementById("result").innerText = "Enter your name!";
      return;
    }

    playerName = input.value;
    step = 1;

    document.getElementById("question").innerText = "Do you know Aman?";
    input.value = "";
    document.getElementById("result").innerText = "";
    return;
  }

  // STEP 1: YES / NO
  if (step === 1) {
    if (ans === "yes") {
      step = 2;
      document.getElementById("question").innerText = questions[index].q;
      input.value = "";
    } else {
      document.body.innerHTML = "<h1>Bye Tata 👋</h1>";
    }
    return;
  }

  // STEP 2: QUIZ
  if (ans === questions[index].a) {
    score++;
    document.getElementById("result").innerText = "Correct 😄";
  } else {
    document.getElementById("result").innerText = "Wrong 😅";
  }

  index++;

  if (index < questions.length) {
    setTimeout(() => {
      document.getElementById("question").innerText = questions[index].q;
      input.value = "";
      document.getElementById("result").innerText = "";
    }, 500);
  } else {
    showFinal();
  }
}

function showFinal() {
  document.body.innerHTML = `
    <h1>🎉 Game Completed 🎉</h1>

    <table>
      <tr>
        <th>Name</th>
        <th>Score</th>
      </tr>
      <tr>
        <td>${playerName}</td>
        <td>${score} / ${questions.length}</td>
      </tr>
    </table>

    <div class="thanks">✨ THANK YOU ✨</div>
  `;
}
</script>

</body>
</html>
