<!DOCTYPE html>
<html>
<head>
  <title>Do You Know Aman? 🎮</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    .box {
      margin-top: 80px;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 8px;
    }

    .thanks {
      font-size: 40px;
      margin-top: 30px;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { color: #fff; }
      to { color: #22c55e; }
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid white;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="box">
  <h2 id="question">Enter your name</h2>
  <input type="text" id="answer" placeholder="Type here">
  <br>
  <button onclick="next()">Submit</button>
  <p id="result"></p>
</div>

<script>
let playerName = "";
let started = false;
let nameTaken = false;

const questions = [
  { q: "What is my age?", a: "20" },
  { q: "Which is my favorite sports team?", a: "rcb" },
  { q: "Do I prefer dogs or cats?", a: "cats" },
  { q: "What is my birth date?", a: "28" },
  { q: "What is my favorite color?", a: "green" },
  { q: "What is my favorite food?", a: "chicken" }
];

let index = 0;
let score = 0;

function next() {
  let ans = document.getElementById("answer").value.toLowerCase();

  // Play music on first click
  document.getElementById("bgMusic").play();

  // STEP 1: TAKE NAME
  if (!nameTaken) {
    playerName = document.getElementById("answer").value;
    nameTaken = true;

    document.getElementById("question").innerText = "Do you know Aman?";
    document.getElementById("answer").value = "";
    return;
  }

  // STEP 2: FIRST QUESTION (YES/NO)
  if (!started) {
    if (ans === "yes") {
      started = true;
      document.getElementById("question").innerText = questions[index].q;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "Let's start 😎";
    } else {
      document.body.innerHTML = "<h1>Bye Tata 👋</h1>";
    }
    return;
  }

  // MAIN QUIZ
  let correct = questions[index].a;

  if (ans === correct) {
    score++;
    document.getElementById("result").innerText = "Correct 😄";
  } else {
    document.getElementById("result").innerText = "Wrong 😅";
  }

  index++;

  if (index < questions.length) {
    setTimeout(() => {
      document.getElementById("question").innerText = questions[index].q;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";
    }, 800);
  } else {
    showFinal();
  }
}
