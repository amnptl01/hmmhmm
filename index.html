<!DOCTYPE html>
<html>
<head>
  <title>Mini Game 🎮</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    .box {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 8px;
    }

    /* Animation for final message */
    .thanks {
      font-size: 40px;
      margin-top: 50px;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { color: #fff; }
      to { color: #38bdf8; }
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="question"></h2>
  <input type="text" id="answer" placeholder="Type answer">
  <br>
  <button onclick="nextQuestion()">Submit</button>
  <p id="result"></p>
</div>

<script>
const questions = [
  { q: "What's my favorite color?", a: "blue" },
  { q: "Where did we first meet?", a: "school" },
  { q: "Who is my favorite person?", a: "you" }
];

let index = 0;
let score = 0;

// show first question
document.getElementById("question").innerText = questions[index].q;

function nextQuestion() {
  let userAns = document.getElementById("answer").value.toLowerCase();
  let correctAns = questions[index].a;

  if(userAns === correctAns) {
    score++;
    document.getElementById("result").innerText = "Correct 😄";
  } else {
    document.getElementById("result").innerText = "Wrong 😅";
  }

  index++;

  if(index < questions.length) {
    setTimeout(() => {
      document.getElementById("question").innerText = questions[index].q;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";
    }, 800);
  } else {
    showFinal();
  }
}

function showFinal() {
  document.body.innerHTML = `
    <h1>🎉 Game Completed 🎉</h1>
    <h2>You got ${score} / ${questions.length} correct 😎</h2>
    <div class="thanks">✨ THANK YOU ✨</div>
  `;
}
</script>

</body>
</html>
